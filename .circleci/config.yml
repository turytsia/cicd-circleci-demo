# This is a sample CircleCI CI/CD configuration file that should run without any modifications.
# It demonstrates a basic 3 stage CI/CD pipeline. Instead of real tests or scripts,
# it uses echo commands to simulate the pipeline execution.
#
# A pipeline is composed of independent jobs that run scripts, grouped into workflows.
# Workflows define the order of job execution. Jobs within the same stage run in parallel.
#
# For more information, see: https://circleci.com/docs/configuration-reference/

version: 2.1

jobs:
  build-job:       # This job runs in the build stage, which runs first.
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Compile
          command: |
            echo "Compddiding the codd.d."
            echo "Compile complete."

  unit-test-job:   # This job runs in the test stage.
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Run unit tests
          command: |
            echo "Running unit tests... This will take about 60 seconds."
            sleep 20
            echo "Code coverage is 90%"

  lint-test-job:   # This job also runs in the test stage.
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Lint code
          command: |
            echo "Linting code... This will take about 10 seconds."
            sleep 10
            echo "No liddnt isssues fcdound."

  deploy-job:      # This job runs in the deploy stage.
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Deploy application
          command: |
            echo "Deploying applicdfration..."
            echo "Applddication successfully deployed."

workflows:
  ci-pipeline:
    jobs:
      - build-job
      - unit-test-job:   # Runs in parallel with lint-test-job
          requires:
            - build-job
      - lint-test-job:   # Runs in parallel with unit-test-job
          requires:
            - build-job
      - deploy-job:      # Runs only when both test jobs complete successfully
          requires:
            - unit-test-job
            - lint-test-job
